services:
  # ============================================================
  # 1. PostgreSQL Database
  # ============================================================
  - type: web
    name: luka-food-api
    env: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    preDeployCommand: pnpm --filter @workspace/db run push
    healthCheckPath: /api/healthz
    envVars:
      - key: PORT
        value: "5000"
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: FRONTEND_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: luka-food-db
          property: connectionString

  # ============================================================
  # 2. Frontend (React + Vite)
  # ============================================================
  - type: web
    name: luka-food-frontend
    env: static
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @workspace/luka-food run build
    staticPublishPath: artifacts/luka-food/dist/public
    envVars:
      - key: PORT
        value: "8080"
      - key: BASE_PATH
        value: /
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        sync: false

databases:
  - name: luka-food-db
    plan: free
    databaseName: luka_food
    user: luka_user

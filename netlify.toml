[build]
  command = "pnpm install --frozen-lockfile && pnpm --filter @workspace/luka-food run build"
  publish = "artifacts/luka-food/dist/public"

[build.environment]
  NODE_VERSION = "22"
  NETLIFY_USE_PNPM = "true"
  BASE_PATH = "/"
  VITE_API_URL = "/api"

# SPA routing - all routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# =============================================================================
# API Proxy — استخدم هذا لتوجيه طلبات API إلى السيرفر الخاص بك
# =============================================================================
# بعد نشر API Server (على Render / Railway / VPS):
# 1. اذهب إلى Netlify Dashboard → Environment variables
# 2. أضف API_URL = https://your-api-server.com
# 3. بعدها افعل التعليقات في الأسفل:
#
# [[redirects]]
#   from = "/api/*"
#   to = "https://your-api-server.com/api/:splat"
#   status = 200

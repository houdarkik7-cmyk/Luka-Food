[build]
  command = "pnpm install --frozen-lockfile && pnpm --filter @workspace/luka-food run build"
  publish = "artifacts/luka-food/dist/public"

[build.environment]
  NODE_VERSION = "24"
  NETLIFY_USE_PNPM = "true"
  BASE_PATH = "/"

# 1. Mock API — يخدم ملفات JSON الثابتة
[[redirects]]
  from = "/api/**"
  to = "/api/:splat.json"
  status = 200

# 2. SPA routing — كل المسارات الأخرى تروح لـ index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build]
  command = "pnpm install --frozen-lockfile && pnpm --filter @workspace/luka-food run build"
  publish = "artifacts/luka-food/dist/public"

[build.environment]
  NODE_VERSION = "22"
  NETLIFY_USE_PNPM = "true"
  BASE_PATH = "/"
  VITE_API_URL = "/api"

# SPA routing - all routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# API proxy - uncomment and set your actual API URL in Netlify env vars
# e.g. Set API_URL env var in Netlify dashboard, then use:
# [[redirects]]
#   from = "/api/*"
#   to = "https://your-api-server.com/api/:splat"
#   status = 200

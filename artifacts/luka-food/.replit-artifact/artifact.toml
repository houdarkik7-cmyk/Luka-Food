kind = "web"
previewPath = "/"
title = "Luka Food — قائمة الطعام"
version = "1.0.0"
id = "artifacts/luka-food"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21773

[services.development]
run = "pnpm --filter @workspace/luka-food run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/luka-food", "run", "build" ]
publicDir = "artifacts/luka-food/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21773"
BASE_PATH = "/"
